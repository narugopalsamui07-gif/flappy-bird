<!DOCTYPE html>
<html>
<head>
  <title>Funny Flappy Bird 😂</title>
  <style>
    body { margin: 0; overflow: hidden; }
    canvas { display: block; }
  </style>
</head>
<body>
<canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// IMAGES
const birdImg = new Image();
birdImg.src = "assets/bird.png";

const bgImg = new Image();
bgImg.src = "assets/bg.jpg";

const pipeSources = [
  "assets/pipe1.png",
  "assets/pipe2.png",
  "assets/pipe3.png"
];

// AUDIO
const music = new Audio("assets/music.mp3");
music.loop = true;

const jumpSound = new Audio("assets/jump.wav");
const gameOverSound = new Audio("assets/gameover.mp3");

// GAME STATE
let gameStarted = false;
let isGameOver = false;

let bird = {
  x: 100,
  y: 200,
  velocity: 0
};

let gravity = 0.5;
let lift = -8;

let pipes = [];
let frame = 0;
let score = 0;
let highScore = localStorage.getItem("highScore") || 0;

// START SCREEN
function drawStartScreen() {
  ctx.fillStyle = "black";
  ctx.font = "40px Arial";
  ctx.fillText("😂 Funny Flappy Bird 😂", canvas.width/2 - 200, canvas.height/2 - 50);
  ctx.font = "25px Arial";
  ctx.fillText("Click to Start", canvas.width/2 - 80, canvas.height/2);
}

// DRAW BIRD
function drawBird() {
  ctx.drawImage(birdImg, bird.x - 20, bird.y - 20, 40, 40);
}

// DRAW PIPES
function drawPipes() {
  for (let i = 0; i < pipes.length; i++) {
    let p = pipes[i];

    ctx.drawImage(p.img, p.x, 0, p.width, p.top);
    ctx.drawImage(p.img, p.x, canvas.height - p.bottom, p.width, p.bottom);

    p.x -= 3;

    // Score update
    if (p.x + p.width < 0) {
      pipes.splice(i, 1);
      score++;
    }

    // Collision
    if (
      bird.x + 20 > p.x &&
      bird.x - 20 < p.x + p.width &&
      (bird.y - 20 < p.top ||
       bird.y + 20 > canvas.height - p.bottom)
    ) {
      gameOver();
    }
  }
}

// UPDATE BIRD
function updateBird() {
  bird.velocity += gravity;
  bird.y += bird.velocity;

  if (bird.y > canvas.height) {
    gameOver();
  }
}

// SPAWN RANDOM PIPES
function spawnPipes() {
  if (frame % 90 === 0) {
    let gap = 150;
    let top = Math.random() * (canvas.height - gap);

    let img = new Image();
    img.src = pipeSources[Math.floor(Math.random() * pipeSources.length)];

    pipes.push({
      x: canvas.width,
      width: 60,
      top: top,
      bottom: canvas.height - top - gap,
      img: img
    });
  }
}

// SCORE DISPLAY
function drawScore() {
  ctx.fillStyle = "black";
  ctx.font = "25px Arial";
  ctx.fillText("Score: " + score, 20, 40);
  ctx.fillText("High: " + highScore, 20, 70);
}

// GAME OVER FUNCTION
function gameOver() {
  if (isGameOver) return;
  isGameOver = true;

  // STOP background music 🔥
  music.pause();
  music.currentTime = 0;

  // Play game over sound
  gameOverSound.play();

  // Save high score
  if (score > highScore) {
    localStorage.setItem("highScore", score);
  }

  // Small delay so sound plays
  setTimeout(() => {
    alert("😂 Game Over! Score: " + score);
    location.reload();
  }, 1500);
}

// GAME LOOP
function gameLoop() {
  ctx.drawImage(bgImg, 0, 0, canvas.width, canvas.height);

  if (!gameStarted) {
    drawStartScreen();
    requestAnimationFrame(gameLoop);
    return;
  }

  if (isGameOver) return;

  drawBird();
  drawPipes();
  updateBird();
  spawnPipes();
  drawScore();

  frame++;
  requestAnimationFrame(gameLoop);
}

// CONTROLS
document.addEventListener("click", () => {
  if (!gameStarted) {
    gameStarted = true;
    music.play();
  }
  if (!isGameOver) {
    bird.velocity = lift;
    jumpSound.play();
  }
});

document.addEventListener("keydown", () => {
  if (!isGameOver) {
    bird.velocity = lift;
    jumpSound.play();
  }
});

gameLoop();
</script>
</body>
</html>
